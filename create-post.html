<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء منشور - WorldHub</title>
<style>
  :root{
    --primary: #6c63ff;
    --primary-dark: #5648e0;
    --secondary: #a855f7;
    --accent: #22c55e;
    --bg: #0b0c14;
    --card-bg: #14151f;
    --text: #f1f1f5;
    --text-muted: #9a9ab3;
    --border: #23242f;
    --danger: #ef4444;
    --radius: 16px;
  }

  *{box-sizing:border-box; margin:0; padding:0; font-family:"Segoe UI", Tahoma, Arial, sans-serif;}

  body{
    background: var(--bg);
    color: var(--text);
    min-height:100vh;
  }

  /* ===== شريط علوي بسيط ===== */
  .page-topbar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 24px;
    border-bottom:1px solid var(--border);
  }
  .page-topbar .logo{
    font-family:"Space Grotesk", sans-serif;
    font-weight:700;
    font-size:18px;
    color: var(--text);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .page-topbar .logo span{ color: var(--primary); }
  .back-link{
    display:flex;
    align-items:center;
    gap:6px;
    color: var(--text-muted);
    text-decoration:none;
    font-size:14px;
    cursor:pointer;
    background:none;
    border:none;
  }
  .back-link:hover{ color: var(--text); }

  .page-center{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:60px 16px;
    flex-direction:column;
    gap:16px;
    text-align:center;
  }
  .page-center p{ color: var(--text-muted); font-size:14px; max-width:360px; }

  /* ===== زر إنشاء منشور الرئيسي ===== */
  .create-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color:#fff;
    border:none;
    padding:14px 26px;
    border-radius:50px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    box-shadow: 0 8px 24px rgba(108,92,231,0.35);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .create-btn:hover{ transform: translateY(-2px); box-shadow: 0 12px 30px rgba(108,92,231,0.5); }
  .create-btn:active{ transform: translateY(0); }
  .create-btn svg{ width:22px; height:22px; }

  /* ===== الخلفية المعتمة ===== */
  .overlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:1000;
  }
  .overlay.active{ display:flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }

  @media (min-width:640px){
    .overlay{ align-items:center; }
  }

  /* ===== النافذة المنبثقة الرئيسية (اختيار النوع) ===== */
  .modal{
    background: var(--card-bg);
    width:100%;
    max-width:480px;
    border-radius: var(--radius) var(--radius) 0 0;
    padding:24px;
    animation: slideUp .25s ease;
    max-height:90vh;
    overflow-y:auto;
    border:1px solid var(--border);
  }
  @media (min-width:640px){
    .modal{ border-radius: var(--radius); }
  }
  @keyframes slideUp{ from{transform:translateY(40px); opacity:0} to{transform:translateY(0); opacity:1} }

  .modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }
  .modal-header h2{ font-size:20px; }
  .close-btn{
    background: var(--border);
    border:none;
    color: var(--text);
    width:34px; height:34px;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background .2s;
  }
  .close-btn:hover{ background: var(--danger); }

  .back-btn{
    background:none;
    border:none;
    color: var(--text-muted);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:14px;
    margin-bottom:4px;
  }
  .back-btn:hover{ color: var(--text); }

  /* ===== شبكة خيارات النوع ===== */
  .type-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:14px;
  }
  .type-card{
    background: rgba(255,255,255,0.03);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px 14px;
    text-align:center;
    cursor:pointer;
    transition: all .2s ease;
  }
  .type-card:hover{
    border-color: var(--primary);
    background: rgba(108,92,231,0.1);
    transform: translateY(-3px);
  }
  .type-icon{
    width:48px; height:48px;
    margin:0 auto 10px;
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
  }
  .type-card p{ font-weight:600; font-size:14px; }
  .type-card span{ font-size:12px; color:var(--text-muted); }

  .icon-post{ background: linear-gradient(135deg,#6C5CE7,#a29bfe); }
  .icon-story{ background: linear-gradient(135deg,#fd79a8,#fab1d3); }
  .icon-reel{ background: linear-gradient(135deg,#00cec9,#55efc4); }
  .icon-video{ background: linear-gradient(135deg,#fdcb6e,#e17055); }

  /* ===== فورم عام ===== */
  .form-group{ margin-bottom:16px; }
  .form-group label{
    display:block;
    font-size:13px;
    color: var(--text-muted);
    margin-bottom:6px;
    font-weight:600;
  }
  textarea, input[type="text"]{
    width:100%;
    background: rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    color: var(--text);
    font-size:14px;
    resize: vertical;
    outline:none;
    transition: border-color .2s;
  }
  textarea:focus, input[type="text"]:focus{ border-color: var(--primary); }
  textarea{ min-height:90px; }

  /* ===== منطقة رفع الملفات ===== */
  .upload-zone{
    border:2px dashed var(--border);
    border-radius:14px;
    padding:30px 16px;
    text-align:center;
    cursor:pointer;
    transition: all .2s;
    position:relative;
  }
  .upload-zone:hover{ border-color: var(--primary); background: rgba(108,92,231,0.05); }
  .upload-zone input[type="file"]{
    position:absolute; inset:0; opacity:0; cursor:pointer;
  }
  .upload-zone .up-icon{ font-size:30px; margin-bottom:8px; }
  .upload-zone p{ font-size:14px; color: var(--text-muted); }
  .upload-zone strong{ color: var(--secondary); }

  .preview-area{
    margin-top:12px;
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:8px;
  }
  .preview-area img, .preview-area video{
    width:100%; height:90px; object-fit:cover; border-radius:10px; border:1px solid var(--border);
  }

  /* ===== شريط خيارات إضافية (مدة، خصوصية..) ===== */
  .options-row{
    display:flex;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .chip{
    background: rgba(255,255,255,0.04);
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    color: var(--text-muted);
  }
  .chip.active{
    border-color: var(--primary);
    color: #fff;
    background: rgba(108,92,231,0.2);
  }

  select{
    width:100%;
    background: rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    color: var(--text);
    font-size:14px;
    outline:none;
  }

  .submit-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color:#fff;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    margin-top:8px;
    transition: opacity .2s;
  }
  .submit-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .submit-btn:not(:disabled):hover{ opacity:.9; }

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(100px);
    background: var(--card-bg);
    border:1px solid var(--primary);
    color:#fff;
    padding:14px 22px;
    border-radius:12px;
    font-size:14px;
    z-index:2000;
    transition: transform .3s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
  }
  .toast.show{ transform:translateX(-50%) translateY(0); }

  .hint{ font-size:12px; color:var(--text-muted); margin-top:-8px; margin-bottom:14px; }
</style>
</head>
<body>

<!-- ===== شريط علوي يربط بالموقع الرئيسي ===== -->
<div class="page-topbar">
  <button class="back-link" onclick="window.location.href='index.html'">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
    رجوع
  </button>
  <div class="logo" onclick="window.location.href='index.html'">WorldHub<span>β</span></div>
</div>

<!-- ===== محتوى الصفحة (يظهر إذا أُغلقت النافذة) ===== -->
<div class="page-center">
  <button class="create-btn" id="openCreateBtn">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
    إنشاء منشور
  </button>
  <p>اختر نوع المحتوى الذي تريد نشره: منشور، قصة، ريلز أو فيديو.</p>
</div>

<!-- ===== الخلفية + النافذة ===== -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <!-- محتوى ديناميكي -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal');
const openBtn = document.getElementById('openCreateBtn');
const toast = document.getElementById('toast');

openBtn.addEventListener('click', () => {
  renderTypeSelect();
  overlay.classList.add('active');
});

// فتح النافذة تلقائياً عند الدخول للصفحة (قادم من زر "Create")
window.addEventListener('DOMContentLoaded', () => {
  renderTypeSelect();
  overlay.classList.add('active');
});

overlay.addEventListener('click', (e) => {
  if(e.target === overlay) closeModal();
});

function closeModal(){
  overlay.classList.remove('active');
}

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 2500);
}

/* ===== الشاشة الرئيسية: اختيار نوع المحتوى ===== */
function renderTypeSelect(){
  modal.innerHTML = `
    <div class="modal-header">
      <h2>إنشاء جديد</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="type-grid">
      <div class="type-card" onclick="renderPostForm()">
        <div class="type-icon icon-post">📝</div>
        <p>منشور</p>
        <span>نص، صور، روابط</span>
      </div>
      <div class="type-card" onclick="renderStoryForm()">
        <div class="type-icon icon-story">⭐</div>
        <p>قصة</p>
        <span>تختفي بعد 24 ساعة</span>
      </div>
      <div class="type-card" onclick="renderReelForm()">
        <div class="type-icon icon-reel">🎬</div>
        <p>ريلز</p>
        <span>فيديو قصير عمودي</span>
      </div>
      <div class="type-card" onclick="renderVideoForm()">
        <div class="type-icon icon-video">🎥</div>
        <p>فيديو</p>
        <span>فيديو طويل</span>
      </div>
    </div>
  `;
}

function backBtn(){
  return `<button class="back-btn" onclick="renderTypeSelect()">&#8594; رجوع</button>`;
}

/* ===== فورم: منشور ===== */
function renderPostForm(){
  modal.innerHTML = `
    <div class="modal-header">
      <div>${backBtn()}<h2>إنشاء منشور</h2></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <form onsubmit="return submitForm(event,'منشور')">
      <div class="form-group">
        <label>ماذا يدور في ذهنك؟</label>
       <textarea
  id="postContent"
  placeholder="اكتب منشورك هنا..."
  required></textarea>
      </div>
      <div class="form-group">
        <label>إضافة صور أو فيديو (اختياري)</label>
        <div class="upload-zone" id="uz-post">
          <input type="file" accept="image/*,video/*" multiple onchange="handleFiles(event,'prev-post')">
          <div class="up-icon">📁</div>
          <p>اسحب الملفات هنا أو <strong>اختر من جهازك</strong></p>
        </div>
        <div class="preview-area" id="prev-post"></div>
      </div>
      <div class="options-row">
        <div class="chip active" data-group="privacy" onclick="selectChip(this)">🌍 عام</div>
        <div class="chip" data-group="privacy" onclick="selectChip(this)">👥 الأصدقاء</div>
        <div class="chip" data-group="privacy" onclick="selectChip(this)">🔒 خاص</div>
      </div>
      <button class="submit-btn" type="submit">نشر</button>
    </form>
  `;
}

/* ===== فورم: قصة ===== */
function renderStoryForm(){
  modal.innerHTML = `
    <div class="modal-header">
      <div>${backBtn()}<h2>إنشاء قصة</h2></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <form onsubmit="return submitForm(event,'قصة')">
      <div class="form-group">
        <label>صورة أو فيديو القصة</label>
        <div class="upload-zone" id="uz-story">
          <input type="file" accept="image/*,video/*" onchange="handleFiles(event,'prev-story')" required>
          <div class="up-icon">⭐</div>
          <p>اختر صورة أو فيديو لقصتك</p>
        </div>
        <p class="hint">المقاس المفضل: عمودي 9:16</p>
        <div class="preview-area" id="prev-story"></div>
      </div>
      <div class="form-group">
        <label>نص فوق القصة (اختياري)</label>
        <input type="text" placeholder="أضف نصاً...">
      </div>
      <button class="submit-btn" type="submit">نشر القصة</button>
    </form>
  `;
}

/* ===== فورم: ريلز ===== */
function renderReelForm(){
  modal.innerHTML = `
    <div class="modal-header">
      <div>${backBtn()}<h2>إنشاء ريلز</h2></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <form onsubmit="return submitForm(event,'ريلز')">
      <div class="form-group">
        <label>فيديو الريلز (عمودي، حتى 90 ثانية)</label>
        <div class="upload-zone" id="uz-reel">
          <input type="file" accept="video/*" onchange="handleFiles(event,'prev-reel')" required>
          <div class="up-icon">🎬</div>
          <p>اختر فيديو من جهازك</p>
        </div>
        <div class="preview-area" id="prev-reel"></div>
      </div>
      <div class="form-group">
        <label>الوصف</label>
        <textarea placeholder="اكتب وصفاً جذاباً..."></textarea>
      </div>
      <div class="form-group">
        <label>الموسيقى (اختياري)</label>
        <input type="text" placeholder="ابحث عن مقطع موسيقي...">
      </div>
      <button class="submit-btn" type="submit">نشر الريلز</button>
    </form>
  `;
}

/* ===== فورم: فيديو ===== */
function renderVideoForm(){
  modal.innerHTML = `
    <div class="modal-header">
      <div>${backBtn()}<h2>رفع فيديو</h2></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <form onsubmit="return submitForm(event,'فيديو')">
      <div class="form-group">
        <label>ملف الفيديو</label>
        <div class="upload-zone" id="uz-video">
          <input type="file" accept="video/*" onchange="handleFiles(event,'prev-video')" required>
          <div class="up-icon">🎥</div>
          <p>اسحب الفيديو هنا أو <strong>اختر من جهازك</strong></p>
        </div>
        <div class="preview-area" id="prev-video"></div>
      </div>
      <div class="form-group">
        <label>عنوان الفيديو</label>
        <input type="text" placeholder="أدخل عنواناً جذاباً" required>
      </div>
      <div class="form-group">
        <label>الوصف</label>
        <textarea placeholder="اكتب وصف الفيديو..."></textarea>
      </div>
      <div class="form-group">
        <label>التصنيف</label>
        <select>
          <option>ترفيه</option>
          <option>تعليم</option>
          <option>رياضة</option>
          <option>موسيقى</option>
          <option>أخرى</option>
        </select>
      </div>
      <button class="submit-btn" type="submit">نشر الفيديو</button>
    </form>
  `;
}

/* ===== أدوات مساعدة ===== */
function selectChip(el){
  const group = el.dataset.group;
  document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function handleFiles(e, previewId){
  const container = document.getElementById(previewId);
  container.innerHTML = '';
  [...e.target.files].forEach(file => {
    const url = URL.createObjectURL(file);
    let el;
    if(file.type.startsWith('video')){
      el = document.createElement('video');
      el.src = url; el.controls = true;
    } else {
      el = document.createElement('img');
      el.src = url;
    }
    container.appendChild(el);
  });
}

async function submitForm(e, type) {

  e.preventDefault();

  if (type !== "منشور") {
    showToast("سيتم ربط القصص والريلز لاحقاً");
    return false;
  }

  const content =
    document.getElementById("postContent").value.trim();

  if (!content) {
    showToast("اكتب محتوى المنشور");
    return false;
  }

  const {
    data: { session }
  } = await window.supabase.auth.getSession();

  if (!session) {
    showToast("يجب تسجيل الدخول أولاً");
    return false;
  }

  const { error } = await window.supabase
    .from("posts")
    .insert([
      {
        user_id: session.user.id,
        content: content,
        image_url: null,
        likes_count: 0,
        comments_count: 0
      }
    ]);

  if (error) {
    console.error(error);
    showToast("فشل نشر المنشور");
    return false;
  }

  closeModal();
  showToast("✅ تم نشر المنشور بنجاح");

  setTimeout(() => {
    window.location.href = "index.html";
  }, 1500);

  return false;
}
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</body>
</html>
