<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | WorldHub</title>
<style>
  :root{
    --bg-dark:#0d0f1a;
    --bg-card:#161927;
    --bg-card-2:#1c2032;
    --purple:#7c5cff;
    --purple-2:#9b7bff;
    --blue:#4f9bff;
    --text:#eef0fa;
    --text-dim:#9aa0b4;
    --border:#272b3d;
    --danger:#ff5c7a;
    --success:#3ddc97;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;
    background:radial-gradient(circle at 20% 20%, #1a1430 0%, #0d0f1a 45%, #0a0c14 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .wrap{width:100%;max-width:420px;}
  .logo{
    text-align:center;
    margin-bottom:28px;
  }
  .logo span{
    font-size:28px;
    font-weight:800;
    background:linear-gradient(90deg,var(--purple),var(--blue));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .logo small{display:block;color:var(--text-dim);font-size:13px;margin-top:4px;}
  .card{
    background:linear-gradient(160deg,var(--bg-card),var(--bg-card-2));
    border:1px solid var(--border);
    border-radius:18px;
    padding:32px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  h1{font-size:22px;margin-bottom:6px;}
  .sub{color:var(--text-dim);font-size:14px;margin-bottom:24px;}
  label{display:block;font-size:13px;color:var(--text-dim);margin:14px 0 6px;}
  input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#10131f;
    color:var(--text);
    font-size:14px;
    outline:none;
    transition:border-color .2s;
  }
  input:focus{border-color:var(--purple);}
  .btn{
    width:100%;
    margin-top:22px;
    padding:13px;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(90deg,var(--purple),var(--blue));
    color:#fff;
    transition:opacity .2s, transform .1s;
  }
  .btn:hover{opacity:.9;}
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .msg{
    margin-top:16px;
    font-size:13px;
    text-align:center;
    padding:10px;
    border-radius:8px;
    display:none;
  }
  .msg.error{background:rgba(255,92,122,0.12);color:var(--danger);display:block;}
  .msg.success{background:rgba(61,220,151,0.12);color:var(--success);display:block;}
  .foot{
    text-align:center;
    margin-top:22px;
    font-size:13px;
    color:var(--text-dim);
  }
  .foot a{color:var(--purple-2);text-decoration:none;font-weight:600;}
  .foot a:hover{text-decoration:underline;}
  .divider{
    display:flex;align-items:center;gap:10px;
    margin:20px 0;color:var(--text-dim);font-size:12px;
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;background:var(--border);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <span>WorldHub</span>
    <small>Connect by Passion</small>
  </div>
  <div class="card">
    <h1>تسجيل الدخول</h1>
    <p class="sub">سجّل الدخول إلى حسابك للمتابعة إلى عوالمك المهنية</p>

    <form id="loginForm">
      <label for="email">البريد الإلكتروني</label>
      <input type="email" id="email" placeholder="example@email.com" required>

      <label for="password">كلمة المرور</label>
      <input type="password" id="password" placeholder="••••••••" required>

      <button type="submit" class="btn" id="loginBtn">تسجيل الدخول</button>
    </form>

    <div class="msg" id="msgBox"></div>

    <div class="divider">أو</div>

    <p class="foot">ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ===== إعدادات Supabase - استبدل القيم التالية ببيانات مشروعك =====
  const SUPABASE_URL = "https://cstplfndguntgaczyupj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_1lYkdVriUeVBtFWG7dO0hg_YFaIWDr4";
  // ====================================================================

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const msgBox = document.getElementById('msgBox');

  function showMsg(text, type){
    msgBox.textContent = text;
    msgBox.className = 'msg ' + type;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'جاري الدخول...';
    msgBox.className = 'msg';

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email, password
    });

    btn.disabled = false;
    btn.textContent = 'تسجيل الدخول';

    if (error) {
      showMsg('خطأ: ' + (error.message || 'تعذر تسجيل الدخول، تحقق من البيانات.'), 'error');
      return;
    }

    showMsg('تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1200);
  });

  // إذا كان المستخدم مسجّل دخوله بالفعل، حوّله مباشرة
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      // window.location.href = 'index.html';
    }
  });
</script>
</body>
</html>
