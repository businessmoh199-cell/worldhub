<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | WorldHub</title>
<style>
  :root{
    --bg-dark:#0d0f1a;
    --bg-card:#161927;
    --bg-card-2:#1c2032;
    --purple:#7c5cff;
    --purple-2:#9b7bff;
    --blue:#4f9bff;
    --text:#eef0fa;
    --text-dim:#9aa0b4;
    --border:#272b3d;
    --danger:#ff5c7a;
    --success:#3ddc97;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;
    background:radial-gradient(circle at 20% 20%, #1a1430 0%, #0d0f1a 45%, #0a0c14 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .wrap{width:100%;max-width:420px;}
  .logo{
    text-align:center;
    margin-bottom:28px;
  }
  .logo span{
    font-size:28px;
    font-weight:800;
    background:linear-gradient(90deg,var(--purple),var(--blue));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .logo small{display:block;color:var(--text-dim);font-size:13px;margin-top:4px;}
  .card{
    background:linear-gradient(160deg,var(--bg-card),var(--bg-card-2));
    border:1px solid var(--border);
    border-radius:18px;
    padding:32px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  h1{font-size:22px;margin-bottom:6px;}
  .sub{color:var(--text-dim);font-size:14px;margin-bottom:24px;}
  label{display:block;font-size:13px;color:var(--text-dim);margin:14px 0 6px;}
  input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#10131f;
    color:var(--text);
    font-size:14px;
    outline:none;
    transition:border-color .2s;
  }
  input:focus{border-color:var(--purple);}
  .hint{font-size:12px;color:var(--text-dim);margin-top:6px;}
  .btn{
    width:100%;
    margin-top:22px;
    padding:13px;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(90deg,var(--purple),var(--blue));
    color:#fff;
    transition:opacity .2s, transform .1s;
  }
  .btn:hover{opacity:.9;}
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .msg{
    margin-top:16px;
    font-size:13px;
    text-align:center;
    padding:10px;
    border-radius:8px;
    display:none;
  }
  .msg.error{background:rgba(255,92,122,0.12);color:var(--danger);display:block;}
  .msg.success{background:rgba(61,220,151,0.12);color:var(--success);display:block;}
  .foot{
    text-align:center;
    margin-top:22px;
    font-size:13px;
    color:var(--text-dim);
  }
  .foot a{color:var(--purple-2);text-decoration:none;font-weight:600;}
  .foot a:hover{text-decoration:underline;}
  .divider{
    display:flex;align-items:center;gap:10px;
    margin:20px 0;color:var(--text-dim);font-size:12px;
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;background:var(--border);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <span>WorldHub</span>
    <small>Connect by Passion</small>
  </div>
  <div class="card">
    <h1>إنشاء حساب جديد</h1>
    <p class="sub">انضم إلى أكثر من 2 مليون محترف في عوالمهم المهنية</p>

    <form id="signupForm">
      <label for="fullname">الاسم الكامل</label>
      <input type="text" id="fullname" placeholder="الاسم الكامل" required>

      <label for="email">البريد الإلكتروني</label>
      <input type="email" id="email" placeholder="example@email.com" required>

      <label for="password">كلمة المرور</label>
      <input type="password" id="password" placeholder="••••••••" minlength="6" required>
      <div class="hint">6 أحرف على الأقل</div>

      <label for="confirmPassword">تأكيد كلمة المرور</label>
      <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required>

      <button type="submit" class="btn" id="signupBtn">إنشاء الحساب</button>
    </form>

    <div class="msg" id="msgBox"></div>

    <div class="divider">أو</div>

    <p class="foot">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ===== إعدادات Supabase - استبدل القيم التالية ببيانات مشروعك =====
  const SUPABASE_URL = "https://cstplfndguntgaczyupj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_1lYkdVriUeVBtFWG7dO0hg_YFaIWDr4";
  // ====================================================================

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('signupForm');
  const btn = document.getElementById('signupBtn');
  const msgBox = document.getElementById('msgBox');

  function showMsg(text, type){
    msgBox.textContent = text;
    msgBox.className = 'msg ' + type;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    msgBox.className = 'msg';

    if (password !== confirmPassword) {
      showMsg('كلمتا المرور غير متطابقتين.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'جاري إنشاء الحساب...';

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: fullname }
      }
    });

    btn.disabled = false;
    btn.textContent = 'إنشاء الحساب';

    if (error) {
      showMsg('خطأ: ' + (error.message || 'تعذر إنشاء الحساب.'), 'error');
      return;
    }
    
    if (data.user) {
      const username = email.split('@')[0];

      await supabaseClient.from('profiles').upsert({
        id: data.user.id,
        full_name: fullname,
        username: username
      });
    }

    showMsg('تم إنشاء الحساب! يرجى التحقق من بريدك الإلكتروني لتفعيل الحساب.', 'success');
    form.reset();

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2000);
  });
</script>
</body>
</html>
